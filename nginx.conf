user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {

    upstream api_gateway {
        least_conn;
        server 103.116.52.222:3000;
        server 103.116.52.219:3000;
    }

    upstream pay_service {
        least_conn;
        server 103.116.52.222:3005;
        server 103.116.52.219:3005;
    }

    # API
    server {
        listen 80;
        server_name api.chienbinhrongthieng.online api.dangpham.id.vn;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name api.chienbinhrongthieng.online api.dangpham.id.vn;
        # nginx vừa check domain hợp lệ bằng server_name, vừa đưa cert xem domain đó có nằm trong cert k( tức là server này đúng là domain đó )
        ssl_certificate /etc/letsencrypt/live/api.chienbinhrongthieng.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.chienbinhrongthieng.online/privkey.pem;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;

        # khóa root
        location = / {
            auth_basic "Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        }

        # khóa swagger
        location /api-docs {
            # allow 123.123.123.123;  # IP văn phòng/team, có thể thêm sau ( tailscale, wireguard, ... )
            # deny all;       
            auth_basic "Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto https;
        }

        # còn lại bình thường
        location / {
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto https;
            # WebSocket
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            # Game - giữ connection lâu, không timeout giữa chừng
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            # Game - tắt buffering, gửi data realtime ngay lập tức
            proxy_buffering off;
        }
    }

    # PAY
    server {
        listen 80;
        server_name pay.chienbinhrongthieng.online pay.dangpham.id.vn;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name pay.chienbinhrongthieng.online pay.dangpham.id.vn;
        ssl_certificate /etc/letsencrypt/live/api.chienbinhrongthieng.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.chienbinhrongthieng.online/privkey.pem;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;

        location / {
            proxy_pass http://pay_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # DATA
    server {
        listen 80;
        server_name data.chienbinhrongthieng.online data.dangpham.id.vn;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name data.chienbinhrongthieng.online data.dangpham.id.vn;
        ssl_certificate /etc/letsencrypt/live/api.chienbinhrongthieng.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.chienbinhrongthieng.online/privkey.pem;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;

        location / {
            proxy_pass http://127.0.0.1:8081;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Origin $http_origin;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
        }
    }

    # REDIS
    server {
        listen 80;
        server_name redis.chienbinhrongthieng.online redis.dangpham.id.vn;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name redis.chienbinhrongthieng.online redis.dangpham.id.vn;
        ssl_certificate /etc/letsencrypt/live/api.chienbinhrongthieng.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.chienbinhrongthieng.online/privkey.pem;
        auth_basic "Bạn cần có quyền";
        auth_basic_user_file /etc/nginx/.htpasswd;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        
        location / {
            proxy_pass http://127.0.0.1:5540;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Origin $http_origin;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
        }
    }

    # POSTGRES
    server {
        listen 80;
        server_name postgres.chienbinhrongthieng.online postgres.dangpham.id.vn;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name postgres.chienbinhrongthieng.online postgres.dangpham.id.vn;
        ssl_certificate /etc/letsencrypt/live/api.chienbinhrongthieng.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.chienbinhrongthieng.online/privkey.pem;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        
        location / {
            proxy_pass http://127.0.0.1:5050;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Origin $http_origin;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
        }
    }

    # DOWNLOAD GAME
    server {
        listen 80;
        server_name download.chienbinhrongthieng.online;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name download.chienbinhrongthieng.online;

        ssl_certificate /etc/letsencrypt/live/api.chienbinhrongthieng.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.chienbinhrongthieng.online/privkey.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;

        location / {
            return 302 https://github.com/DANG-PH/NRO_ONLINE/releases/tag/v1.0.0;
        }
    }
}

stream {
    server {
        listen 33306;
        proxy_pass 127.0.0.1:3306;
    }
    server {
        listen 36379;
        proxy_pass 127.0.0.1:6379;
    }
    server {
        listen 35432;
        proxy_pass 127.0.0.1:5432;
    }
    server {
        listen 35674;
        proxy_pass 127.0.0.1:5674;
    }
    server {
        listen 37017;
        proxy_pass 127.0.0.1:27017;
    }
}

